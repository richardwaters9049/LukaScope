<svg width="1600" height="480" viewBox="0 0 1600 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1736"/>
      <stop offset="0.5" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="scope" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="480" rx="26" fill="url(#bg)"/>

  <circle cx="1420" cy="90" r="165" fill="#FB7185" opacity="0.14"/>
  <circle cx="122" cy="428" r="156" fill="#22D3EE" opacity="0.13"/>

  <g opacity="0.3">
    <circle cx="1280" cy="150" r="24" fill="#F59E0B"/>
    <circle cx="1342" cy="126" r="18" fill="#22D3EE"/>
    <circle cx="1398" cy="168" r="16" fill="#F97316"/>
  </g>

  <g filter="url(#soft)">
    <rect x="68" y="88" width="126" height="126" rx="30" fill="#0F172A" opacity="0.42"/>
    <circle cx="131" cy="151" r="46" fill="none" stroke="#E2E8F0" stroke-width="6"/>
    <circle cx="131" cy="151" r="24" fill="url(#scope)"/>
    <circle cx="131" cy="151" r="9" fill="#F8FAFC"/>

    <path d="M169 190L188 209" stroke="#E2E8F0" stroke-width="7" stroke-linecap="round"/>
    <circle cx="191" cy="212" r="8" fill="url(#warm)"/>
    <circle cx="94" cy="110" r="7" fill="#F59E0B"/>
    <circle cx="176" cy="108" r="7" fill="#FB7185"/>
  </g>

  <text x="232" y="168" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="700">LukaScope</text>
  <text x="232" y="224" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="500">Clinical AI Platform for Blood Smear Screening</text>

  <rect x="232" y="265" width="520" height="56" rx="14" fill="white" opacity="0.12"/>
  <text x="260" y="302" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="26">Detection + Explainability + Review Workflow</text>

  <rect x="770" y="265" width="445" height="56" rx="14" fill="#111827" opacity="0.38"/>
  <text x="798" y="302" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="26">Designed for Clinical Confidence</text>

  <text x="232" y="374" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">Fast triage • Explainable predictions • Clear reporting</text>
