services:
  frontend:
    image: lukascope-frontend-dev
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=1000
      - TSC_WATCHFILE=DynamicPriorityPolling
    command: bun run --cwd frontend dev --webpack --hostname 0.0.0.0
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend
    networks:
      - lukascope-network
    restart: unless-stopped

  backend:
    image: lukascope-backend-dev
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - TS_NODE_DEV_USE_POLLING=true
      - TSC_WATCHFILE=DynamicPriorityPolling
    command: bun run dev:backend
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules
    networks:
      - lukascope-network
    restart: unless-stopped

  # AI Training service (commented out by default - run on-demand)
  # ai-training:
  #   build:
  #     context: ./backend/ai
  #     dockerfile: Dockerfile
  #   volumes:
  #     - ./backend/ai:/app
  #     - ./data:/app/data
  #   environment:
  #     - PYTHONUNBUFFERED=1
  #   networks:
  #     - lukascope-network
  #   profiles:
  #     - ai  # Use: docker-compose --profile ai up ai-training

networks:
  lukascope-network:
    driver: bridge

volumes:
  frontend_node_modules:
  backend_node_modules:
  root_node_modules:
