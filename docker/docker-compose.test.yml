# Docker Compose configuration for running tests
# Usage: docker-compose -f docker/docker-compose.test.yml up --build

services:
  frontend-test:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: test
    environment:
      - NODE_ENV=test
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - lukascope-test-network

  backend-test:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: test
    environment:
      - NODE_ENV=test
    volumes:
      - ../backend:/app/backend
      - ../package.json:/app/package.json
      - ../bun.lock:/app/bun.lock
      - /app/node_modules
      - /app/backend/node_modules
      - /app/backend/dist
    networks:
      - lukascope-test-network

  ai-test:
    build:
      context: ../backend/ai
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ../backend/ai:/app
      - /app/.venv
    networks:
      - lukascope-test-network
    profiles:
      - ai

networks:
  lukascope-test-network:
    driver: bridge
